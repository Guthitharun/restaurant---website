<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADHIRATHA FAMILY RESTAURANT A/C PAMUR</title>
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Stylesheets -->
  <!-- CSS references use '../' since this is inside the admin/ directory -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="admin-login-wrapper" id="admin-login-container">

  <div class="admin-login-card animate-scale">
    <div class="admin-login-icon">
      <i class="fa-solid fa-user-lock"></i>
    </div>
    
    <h2>System Administrator</h2>
    <p class="text-secondary text-sm">Please sign in to access order control dashboards</p>

    <form id="admin-login-form" style="text-align: left;">
      <div class="form-group">
        <label for="admin-username" class="form-label">Username</label>
        <input type="text" id="admin-username" class="form-input" placeholder="e.g. admin" value="admin" required>
      </div>

      <div class="form-group">
        <label for="admin-password" class="form-label">System Password</label>
        <input type="password" id="admin-password" class="form-input" placeholder="Password key" value="adhiratha2024" required>
        <span class="form-hint" style="color: var(--gold-light);">* Default Sandbox Pass: adhiratha2024</span>
      </div>

      <button type="submit" class="btn btn-gold btn-block btn-lg mt-2">
        <i class="fa-solid fa-unlock-keyhole"></i> Unlock Dashboard
      </button>
    </form>
    
    <a href="../index.html" class="text-xs text-muted" style="margin-top:20px; display:inline-block;">
      <i class="fa-solid fa-arrow-left"></i> Back to Public Website
    </a>
  </div>

  <!-- Scripts -->
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
