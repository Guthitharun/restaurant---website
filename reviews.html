<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADHIRATHA FAMILY RESTAURANT A/C PAMURU</title>
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="menu-page" id="reviews-page-container">

  <!-- Header / Navigation -->
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <div class="nav-brand-icon">A</div>
        <div class="nav-brand-text">
          <span class="nav-brand-name">ADHIRATHA</span>
          <span class="nav-brand-tag">Family Restaurant</span>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="reservation.html" class="nav-link">Table Booking</a>
        <a href="reviews.html" class="nav-link active">Reviews</a>
        <a href="contact.html" class="nav-link">Contact</a>
        
        <a href="cart.html" class="nav-cart">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge">0</span>
        </a>
      </nav>

      <div class="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <div class="nav-overlay"></div>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Guest Feedback</h1>
      <p class="text-secondary">Read what our valued customers say about our food quality, AC seating, and services.</p>
    </div>
  </section>

  <!-- Reviews Dashboard & Submission Area -->
  <section class="section" style="padding-top: var(--space-xl);">
    <div class="container">
      
      <!-- Top Grid: Average score and submission form side by side -->
      <div class="reservation-wrapper mb-4">
        
        <!-- Score Column -->
        <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:var(--radius-xl); text-align:center;">
          <h3 class="mb-3" style="font-family:var(--font-heading); color:var(--gold);">Rating Summary</h3>
          <div id="reviews-avg-score" style="font-size:3.5rem; font-weight:800; font-family:var(--font-heading); color:var(--gold); line-height:1; margin-bottom:10px;">0.0</div>
          <div class="review-stars justify-content-center" id="reviews-avg-stars" style="display:flex; justify-content:center; gap:4px; font-size:1.4rem; margin-bottom:10px;">
            <!-- Stars loaded dynamically -->
          </div>
          <div class="text-muted text-sm" id="reviews-total-count">Based on 0 reviews</div>
          
          <div class="divider"></div>

          <!-- Stars progress bar details breakdown -->
          <div id="reviews-star-breakdown" style="text-align:left;">
            <!-- Populated dynamically -->
          </div>
        </div>

        <!-- Submission Form Column -->
        <div>
          <form id="reviews-form" style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:var(--radius-xl);">
            <h3 class="mb-4" style="font-family:var(--font-heading); color:var(--gold);">Share Your Review</h3>
            
            <div class="form-group">
              <label for="review-name" class="form-label">Your Name <span class="required">*</span></label>
              <input type="text" id="review-name" class="form-input" placeholder="Enter your display name" required>
            </div>

            <div class="form-group">
              <label class="form-label">Your Overall Rating <span class="required">*</span></label>
              <div class="star-rating-input">
                <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
              </div>
            </div>

            <div class="form-group">
              <label for="review-comment" class="form-label">Review Comment <span class="required">*</span></label>
              <textarea id="review-comment" class="form-textarea" placeholder="What did you like or dislike? (e.g. food quality, delivery speed, AC ambiance...)" required></textarea>
            </div>

            <button type="submit" class="btn btn-gold btn-block btn-lg">
              Submit Review Feedback
            </button>
          </form>
        </div>

      </div>

      <!-- Divider Ornament -->
      <div class="divider-ornament">
        <i class="fa-solid fa-utensils"></i>
      </div>

      <!-- Feed / List Column -->
      <div>
        <h2 style="font-family:var(--font-heading); text-align:center; margin-bottom:30px;">What our foodies are saying</h2>
        <div id="reviews-list-container">
          <!-- Dynamically populated in JavaScript from reviews.js -->
        </div>
      </div>

    </div>
  </section>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reviews.js"></script>
</body>
</html>
